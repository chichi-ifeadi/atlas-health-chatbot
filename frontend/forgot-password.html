<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"></noscript>
  <link rel="stylesheet" href="styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Manrope', sans-serif;
      padding: 24px 16px;
    }

    .card {
      background: var(--surface-primary);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-lg);
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .card-header { display: flex; flex-direction: column; gap: 8px; }

    .brand-label {
      font-family: 'Manrope', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-deep);
    }

    .card-title {
      font-family: 'Manrope', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .card-subtitle { font-size: 0.9rem; color: var(--muted); line-height: 1.5; }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field-label {
      font-family: 'Manrope', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input {
      background: var(--surface-soft);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-control);
      padding: 12px 16px;
      font-family: 'Manrope', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .field input::placeholder { color: var(--muted); opacity: 0.6; }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .btn-row { display: flex; gap: 10px; margin-top: 4px; }

    .btn-primary {
      flex: 1;
      height: var(--control-height);
      background: var(--accent-deep);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-family: 'Manrope', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-outline {
      flex: 1;
      height: var(--control-height);
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-pill);
      font-family: 'Manrope', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .btn-outline:hover { border-color: var(--accent); background: var(--accent-soft); }

    .status-msg {
      font-size: 0.82rem;
      min-height: 1.2em;
      color: var(--muted);
      text-align: center;
    }

    .status-msg.error { color: var(--accent-deep); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    .token-box {
      background: var(--surface-soft);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-control);
      padding: 14px 16px;
    }

    .token-box-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-deep);
      margin: 0 0 8px;
    }

    .token-value {
      display: block;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.82rem;
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
      user-select: all;
    }

    .token-hint { font-size: 0.82rem; color: var(--muted); margin: 8px 0 0; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <a class="back-to-chat-btn" href="/">← Back to home</a>
  <div class="card">
    <div class="card-header">
      <span class="brand-label">Atlas</span>
      <h1 class="card-title">Forgot your password?</h1>
      <p class="card-subtitle">Enter your email and we'll generate a reset token.</p>
    </div>

    <form id="requestResetForm" class="auth-form">
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="btn-row">
        <button id="requestBtn" class="btn-primary" type="submit">Send reset link</button>
        <a class="btn-outline" href="/signin">Back</a>
      </div>

      <p id="requestStatus" class="status-msg"></p>
    </form>

    <div id="tokenSection" style="display:none;">
      <hr class="divider" />
      <div class="token-box">
        <p class="token-box-label">Reset token (demo mode)</p>
        <code id="tokenValue" class="token-value"></code>
      </div>
      <p class="token-hint">Copy the token and use it on the next page.</p>
    </div>

    <hr class="divider" />

    <div style="text-align:center;">
      <a id="goResetLink" href="/reset-password"
        style="font-size:0.85rem;color:var(--accent-deep);text-decoration:none;font-weight:600;">
        Have a token? Reset password →
      </a>
    </div>
  </div>

  <script src="forgot-password.js"></script>
</body>
</html>
