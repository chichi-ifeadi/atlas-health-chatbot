<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Playfair+Display:wght@700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Playfair+Display:wght@700;800&display=swap"></noscript>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scene-glow scene-glow-left"></div>
  <div class="scene-glow scene-glow-right"></div>

  <div class="app-shell">
    <section class="hero-panel"></section>

    <div class="resize-handle" id="resizeHandle" aria-hidden="true"></div>

    <section class="chat-panel">
      <div class="chat-panel-toolbar">
        <button id="sidebarExpandBtn" class="sidebar-toggle-btn sidebar-expand-btn" type="button" aria-label="Expand sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
        <a class="toolbar-home-link" href="/landing">Return to home page</a>
      </div>
      <main class="chat-window" id="chatWindow" aria-live="polite"></main>

      <section class="suggestions-wrap" aria-label="Quick prompts">
        <p id="suggestionsLabel" class="suggestions-label">Quick starts</p>
        <div class="suggestions" id="suggestions"></div>
      </section>

      <form id="chatForm" class="chat-form">
        <label class="input-shell" for="chatInput">
          <span class="input-label">Message Atlas</span>
          <input id="chatInput" type="text" placeholder="Ask about sleep, stress, energy, focus, or healthy routines..." autocomplete="off" required />
        </label>
        <label class="style-shell" for="responseStyle">
          <span class="input-label">Style</span>
          <select id="responseStyle" aria-label="Response style">
            <option value="short">Short</option>
            <option value="balanced" selected>Balanced</option>
            <option value="detailed">Detailed</option>
          </select>
        </label>
        <button id="sendBtn" type="submit">Send</button>
      </form>
      <p id="statusText" class="status"></p>

      <footer class="footer">
        <p id="footerText">Atlas provides wellness support only and does not offer medical diagnoses or treatments.</p>
      </footer>
    </section>
  </div>

  <script src="sidebar.js"></script>
  <script src="app.js"></script>
</body>
</html>
