<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversations - Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="back-to-chat-btn" href="/chat">← Back to chat</a>
  <div class="scene-glow scene-glow-left"></div>
  <div class="scene-glow scene-glow-right"></div>

  <div class="app-shell">
    <section class="hero-panel"></section>

    <div class="resize-handle" id="resizeHandle" aria-hidden="true"></div>

    <section class="page-panel">
      <div class="page-panel-toolbar">
        <button id="sidebarExpandBtn" class="sidebar-toggle-btn sidebar-expand-btn" type="button" aria-label="Expand sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>

      <div class="page-panel-body history-layout" style="padding:0">
        <aside class="history-sidebar">
          <h2>Conversations</h2>
          <p>Your past sessions with Atlas.</p>
          <input id="historySearch" class="history-search" type="text" placeholder="Search conversations..." />
          <div id="historySessionList" class="history-session-list"></div>
        </aside>

        <section class="history-main">
          <header class="history-main-top">
            <div class="history-main-title" id="historySessionTitle">Select a conversation</div>
            <div class="history-main-actions">
              <button id="resumeSessionBtn" class="topbar-btn topbar-btn-primary" type="button" disabled>Resume Session</button>
            </div>
          </header>
          <main id="historyPreview" class="history-preview"></main>
        </section>
      </div>
    </section>
  </div>

  <script src="sidebar.js"></script>
  <script src="history.js"></script>
</body>
</html>
